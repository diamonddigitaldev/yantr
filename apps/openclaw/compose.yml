services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw

    init: true
    restart: unless-stopped

    # Bind explicitly (important per Dockerfile note)
    command: ["node", "openclaw.mjs", "gateway", "--bind", "lan", "--allow-unconfigured"]

    ports:
      - "18789"   # API / gateway
      - "18790"   # optional secondary port (if used)

    environment:
      NODE_ENV: production

      # Optional: configure auth early (recommended if exposing publicly)
      # OPENCLAW_AUTH_TOKEN: "change-me"

      # Optional: extensions (if your image supports them)
      # OPENCLAW_EXTENSIONS: "diagnostics-otel matrix"

    volumes:
      - openclaw_data:/app/data
      - openclaw_cache:/home/node/.cache

    # Healthcheck aligned with Dockerfile
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 20s

    # Security hardening
    user: "1000:1000"   # node user
    read_only: false    # set true if you fully externalize writes

    # Resource limits (prevents runaway memory usage)
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m

    # Better logging control
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      yantr.app: "openclaw"
      yantr.service: "AI Assistant"

volumes:
  openclaw_data:
  openclaw_cache: