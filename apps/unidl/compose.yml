services:
  remote-torrent-downloader:
    image: ghcr.io/besoeasy/UniDL:latest
    container_name: unidl
    labels:
      yantr.app: "unidl"
      yantr.service: "UniDL"
    ports:
      - "6798"
      - "6799"
      - "4445"
      - "6888/tcp"
      - "6888/udp"
    environment:
      TELEGRAMBOT: ${TELEGRAM_BOT_TOKEN}
      NSEC: ${NOSTR_NSEC}
      AUTHCODE: ${AUTHCODE}
    volumes:
      - unidl_data:/tmp/unidl
    restart: unless-stopped

volumes:
  unidl_data: